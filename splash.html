<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0C111D;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .container {
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .loader {
      width: 120px;
      height: 3px;
      background: rgba(255,102,0,0.15);
      border-radius: 3px;
      margin: 0 auto;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: #FF6600;
      border-radius: 3px;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#0C111D"/>
      <circle cx="16" cy="16" r="3" stroke="#FF6600" stroke-width="2" fill="none"/>
      <path d="M8.93 23.07A10 10 0 0 1 6 16C6 10.48 10.48 6 16 6s10 4.48 10 10a10 10 0 0 1-2.93 7.07" stroke="#FF6600" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M12.46 19.54A5 5 0 0 1 11 16a5 5 0 0 1 5-5 5 5 0 0 1 5 5 5 5 0 0 1-1.46 3.54" stroke="#FF6600" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="title">Radio 24/7</div>
    <div class="subtitle">Cargando...</div>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>
</body>
</html>
