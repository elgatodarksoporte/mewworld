<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; height: 32px; background: #0C111D; }
  #titlebar {
    height: 32px;
    background: #0C111D;
    -webkit-app-region: drag;
    app-region: drag;
    display: flex;
    align-items: center;
    padding-left: 12px;
    user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #title {
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    letter-spacing: 0.3px;
    flex: 1;
    pointer-events: none;
  }
  .btn {
    -webkit-app-region: no-drag;
    app-region: no-drag;
    width: 46px;
    height: 32px;
    border: none;
    background: transparent;
    color: #9ca3af;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.1); }
  .btn.close:hover { background: #e81123; color: #fff; }
  .btn svg { width: 10px; height: 10px; stroke: currentColor; stroke-width: 1.5; fill: none; }
</style>
</head>
<body>
  <div id="titlebar">
    <span id="title">MewWorld</span>
    <button class="btn" id="btn-min"><svg viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5"/></svg></button>
    <button class="btn" id="btn-max"><svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" rx="1"/></svg></button>
    <button class="btn close" id="btn-close"><svg viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10"/><line x1="10" y1="0" x2="0" y2="10"/></svg></button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    document.getElementById('btn-min').onclick = () => ipcRenderer.send('window-control', 'minimize');
    document.getElementById('btn-max').onclick = () => ipcRenderer.send('window-control', 'maximize');
    document.getElementById('btn-close').onclick = () => ipcRenderer.send('window-control', 'close');

    // Listen for color updates from main process
    ipcRenderer.on('titlebar-color', (e, { color, symbolColor }) => {
      document.getElementById('titlebar').style.background = color;
      document.body.style.background = color;
      document.getElementById('title').style.color = symbolColor;
      document.querySelectorAll('.btn').forEach(b => b.style.color = symbolColor);
    });
  </script>
</body>
</html>
