<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0C111D;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    .container { text-align: center; }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      opacity: 0.4;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f04747;
    }
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .retry-btn {
      background: rgba(255,102,0,0.15);
      border: 1px solid rgba(255,102,0,0.3);
      color: #FF6600;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .retry-btn:hover {
      background: rgba(255,102,0,0.25);
      border-color: rgba(255,102,0,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <div class="title">Sin conexion</div>
    <div class="subtitle">No se pudo conectar al servidor.<br>Verifica tu conexion a internet.</div>
    <button class="retry-btn" onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
