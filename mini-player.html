<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0C111D;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
      border: 1px solid rgba(255,102,0,0.2);
      border-radius: 12px;
    }
    .container {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      height: 60px;
    }
    .icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .info {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }
    .title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .subtitle {
      font-size: 10px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .controls {
      display: flex;
      gap: 4px;
      -webkit-app-region: no-drag;
    }
    .ctrl-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .ctrl-btn:hover { background: rgba(255,102,0,0.2); }
    .ctrl-btn.close:hover { background: rgba(240,71,71,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="3" stroke="#FF6600" stroke-width="2" fill="none"/>
      <path d="M8.93 23.07A10 10 0 0 1 6 16C6 10.48 10.48 6 16 6s10 4.48 10 10a10 10 0 0 1-2.93 7.07" stroke="#FF6600" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M12.46 19.54A5 5 0 0 1 11 16a5 5 0 0 1 5-5 5 5 0 0 1 5 5 5 5 0 0 1-1.46 3.54" stroke="#FF6600" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="info">
      <div class="title" id="song-title">Radio 24/7</div>
      <div class="subtitle" id="song-artist">MewWorld</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="btn-expand" title="Abrir ventana principal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <button class="ctrl-btn close" id="btn-close" title="Cerrar mini player">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <script>
    document.getElementById('btn-expand').addEventListener('click', () => {
      window.electronAPI.expandWindow();
    });
    document.getElementById('btn-close').addEventListener('click', () => {
      window.electronAPI.closeMiniPlayer();
    });
    // Listen for song updates from main process
    window.electronAPI.onSongUpdate((data) => {
      if (data.title) document.getElementById('song-title').textContent = data.title;
      if (data.artist) document.getElementById('song-artist').textContent = data.artist;
    });
  </script>
</body>
</html>
